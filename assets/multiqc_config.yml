# --- Report metadata ---------------------------------------------------------
title: "22G siRNAs analysis"
subtitle: "National Facility for Data Handling and Analysis"
intro_text: "Results Report"

# --- Logo --------------------------------------------------------------------
custom_logo: "ht_logo.png"
custom_logo_url: "https://humantechnopole.it/it/facility/piattaforma-nazionale-per-la-gestione-e-lanalisi-dei-dati/"

report_comment: >
  This report has been generated by the <a href="https://github.com/nfdata-omics/22g_sirnas/" target="_blank">nfdata-omics/22g_sirnas</a>
  analysis pipeline.
module_order:
  - fastqc:
      name: "FastQC (raw)"
      anchor: "fastqc_raw"
      target: ""
      info: "This section of the report shows FastQC results on the input files."
      path_filters:
        - "**/*.raw_fastqc.zip"
  - cutadapt
  - fastqc:
      name: "FastQC (trim)"
      anchor: "fastqc_trim"
      target: ""
      info: "This section of the report shows FastQC results after Cutadapt."
      path_filters:
        - "**/*.trim_fastqc.zip"
  - bowtie1
  - featurecounts
report_section_order:
  fastqc_raw:
    order: 10000
  cutadapt:
    order: 9000
  fastqc_trim:
    order: 8000
  bowtie1:
    name: "Bowtie"
    order: 7000
  featurecounts:
    order: 6000
  "nfdata-omics-22g_sirnas-methods-description":
    order: -1000
  multiqc_software_versions:
    order: -1001
  "nfdata-omics-22g_sirnas-summary":
    order: -1002

export_plots: true

disable_version_detection: true

# Option to disable sample name cleaning if desired
fn_clean_sample_names: true
use_filename_as_sample_name: false

# Keep the same sample identifier across raw, trim and downstream modules
extra_fn_clean_trim:
  - ".raw"
  - ".trim"

sample_names_replace_regex: true
sample_names_replace:
  "NFG072_0([0-9]{2})_tLIB_S[0-9]+_L[0-9]+_R1_001": "CE\\1"
