repository_type: pipeline

nf_core_version: 3.4.1

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-22g_sirnas_logo_light.png
    - docs/images/nf-core-22g_sirnas_logo_light.png
    - docs/images/nf-core-22g_sirnas_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config:
    - report_comment
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-22g_sirnas_logo_light.png
    - docs/images/nf-core-22g_sirnas_logo_light.png
    - docs/images/nf-core-22g_sirnas_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml

template:
  org: nfdata-omics
  name: 22G_siRNAs
  description: This repository-style note documents a compact single-sample workflow
    for quantifying 22G-RNAs from small RNA-seq data
  author: K.Ruiz-Ceja
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - gpu
  is_nfcore: false
